# Creates a semver release tag (and GitHub Release) on each push to main,
# unless the commit is already tagged or the message contains [skip release].
name: Release tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-tag-${{ github.repository }}
  cancel-in-progress: false

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if echo "${{ github.event.head_commit.message }}" | grep -qi '\[skip release\]'; then
            echo "Skipping: commit message contains [skip release]"
            exit 0
          fi

          if git describe --exact-match --tags HEAD >/dev/null 2>&1; then
            echo "Skipping: HEAD already has tag $(git describe --exact-match --tags HEAD)"
            exit 0
          fi

          LATEST_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"

          if [ -z "$LATEST_TAG" ]; then
            PKG_VERSION="$(node -p "require('./package.json').version")"
            NEXT_TAG="v${PKG_VERSION}"
            echo "No prior semver tag; using package.json → ${NEXT_TAG}"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR="${VERSION%%.*}"
            REST="${VERSION#*.}"
            MINOR="${REST%%.*}"
            PATCH="${REST#*.}"
            PATCH="${PATCH%%-*}"
            NEXT_PATCH=$((PATCH + 1))
            NEXT_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
            echo "Latest tag ${LATEST_TAG} → ${NEXT_TAG}"
          fi

          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Tag ${NEXT_TAG} already exists; skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEXT_TAG" -m "Release ${NEXT_TAG}"
          git push origin "$NEXT_TAG"

          gh release create "$NEXT_TAG" \
            --generate-notes \
            --title "Release ${NEXT_TAG}"
